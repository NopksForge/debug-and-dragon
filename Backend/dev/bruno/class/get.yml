info:
  name: get
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/class/config/fighter"
  headers:
    - name: X-Reference-Id
      value: "{{randRefID}}"
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const { v4: uuidv4 } = require('uuid');

        const uuid = uuidv4();
        bru.setVar("randRefID", uuid);

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
